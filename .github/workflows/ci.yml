name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # lockfile é gerado com npm 11 localmente; o npm 10 do runner não o entende
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm ci --prefix client && npm run build --prefix client
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test
      - run: npm run verify-integrations
